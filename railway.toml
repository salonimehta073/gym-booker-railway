[build]
dockerfilePath = "Dockerfile"

[deploy]
# Runs at 08:50, 09:50, and 14:50 UTC daily.
# Script checks if any booking releases within next 15 min.
# If nothing pending, exits in <1 sec. If pending, waits for exact release and books.
#
# Coverage:
#   08:50 UTC → catches 09:05-09:15 UTC releases (Sat 11:15 CET, Mon 12:00 CET)
#   09:50 UTC → backup for morning releases if 08:50 run missed
#   14:50 UTC → catches 15:00 UTC releases (Fri 17:00 CET)
cronSchedule = "20 9 9 5 *"
